version: '3.8'

services:
  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scheduling_backend
    ports:
      - "3001:3000"
    environment:
      - GIN_MODE=release
      - FIREBASE_PROJECT_ID=scheduling-app-a8f7f
      # Optionally mount service account key file for full Firebase Auth verification:
      # - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
    restart: unless-stopped

  frontend-service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scheduling_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend-service
    restart: unless-stopped
